<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1050"/>
      <stop offset="100%" stop-color="#0a0020"/>
    </radialGradient>
    <radialGradient id="glow-gold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,215,0,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,215,0,0)"/>
    </radialGradient>
    <radialGradient id="glow-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,255,100,0.25)"/>
      <stop offset="100%" stop-color="rgba(0,255,100,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>

  <!-- Subtle star sparkles -->
  <circle cx="30" cy="30" r="2" fill="rgba(200,150,255,0.5)"/>
  <circle cx="150" cy="25" r="1.5" fill="rgba(255,200,255,0.4)"/>
  <circle cx="25" cy="140" r="1.5" fill="rgba(0,200,100,0.4)"/>
  <circle cx="155" cy="150" r="2" fill="rgba(255,200,100,0.5)"/>
  <circle cx="90" cy="15" r="1.5" fill="rgba(200,180,255,0.4)"/>
  <circle cx="165" cy="90" r="1.5" fill="rgba(255,150,200,0.3)"/>
  <circle cx="15" cy="85" r="1" fill="rgba(100,200,255,0.3)"/>

  <!-- Princess golden glow -->
  <circle cx="60" cy="85" r="45" fill="url(#glow-gold)"/>

  <!-- Witch green glow -->
  <circle cx="125" cy="95" r="40" fill="url(#glow-green)"/>

  <!-- === PRINCESS CROWN (left) === -->
  <g transform="translate(60, 70)">
    <!-- Crown body -->
    <path d="M-28,8 L-22,-12 L-14,2 L-6,-16 L0,-2 L6,-16 L14,2 L22,-12 L28,8 Z" fill="#ffd700"/>
    <!-- Crown base band -->
    <rect x="-28" y="8" width="56" height="8" rx="2" fill="#daa520"/>
    <!-- Gems -->
    <circle cx="-14" cy="-6" r="4" fill="#ff0066"/>
    <circle cx="0" cy="-10" r="4.5" fill="#00ccff"/>
    <circle cx="14" cy="-6" r="4" fill="#aa00ff"/>
    <!-- Gem shine -->
    <circle cx="-15" cy="-7.5" r="1.5" fill="rgba(255,255,255,0.6)"/>
    <circle cx="-1" cy="-11.5" r="1.5" fill="rgba(255,255,255,0.6)"/>
    <circle cx="13" cy="-7.5" r="1.5" fill="rgba(255,255,255,0.6)"/>
    <!-- Sparkle rays -->
    <line x1="0" y1="-22" x2="0" y2="-26" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="-20" x2="-11" y2="-23" stroke="#ffd700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="-20" x2="11" y2="-23" stroke="#ffd700" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- === WITCH HAT (right) === -->
  <g transform="translate(125, 85)">
    <!-- Hat body -->
    <path d="M-24,0 L-4,-52 Q6,-48 8,-38 L24,0 Z" fill="#0a0020"/>
    <!-- Hat brim -->
    <ellipse cx="0" cy="2" rx="30" ry="10" fill="#150a30"/>
    <!-- Hat band -->
    <rect x="-16" y="-10" width="32" height="7" rx="1" fill="#00ff88"/>
    <!-- Buckle -->
    <rect x="-6" y="-11" width="12" height="9" rx="1.5" fill="#ffd700"/>
    <rect x="-3" y="-9" width="6" height="5" rx="1" fill="#0a0020"/>
    <!-- Stars on hat -->
    <text x="-10" y="-22" font-size="8" fill="rgba(0,255,150,0.7)">⭐</text>
    <text x="6" y="-36" font-size="6" fill="rgba(0,255,150,0.5)">✨</text>
    <!-- Green magic wisp -->
    <circle cx="-8" cy="14" r="3" fill="rgba(0,255,100,0.2)"/>
    <circle cx="5" cy="16" r="2.5" fill="rgba(0,255,100,0.15)"/>
    <circle cx="-2" cy="18" r="2" fill="rgba(0,200,80,0.1)"/>
  </g>

  <!-- VS divider spark -->
  <circle cx="90" cy="90" r="3" fill="rgba(255,255,255,0.15)"/>

  <!-- Subtle web in bottom-left corner -->
  <g transform="translate(18, 162)" opacity="0.2" stroke="#ccccff" stroke-width="0.8" fill="none">
    <line x1="0" y1="0" x2="-12" y2="-12"/>
    <line x1="0" y1="0" x2="0" y2="-16"/>
    <line x1="0" y1="0" x2="12" y2="-10"/>
    <path d="M-6,-6 Q0,-8 6,-5" />
    <path d="M-9,-9 Q0,-12 9,-7.5" />
  </g>

  <!-- Magic wand sparkle trail bottom-right -->
  <g transform="translate(158, 165)" opacity="0.3">
    <circle cx="0" cy="0" r="2" fill="#ffd700"/>
    <circle cx="-7" cy="-3" r="1.5" fill="rgba(255,215,0,0.6)"/>
    <circle cx="-12" cy="-8" r="1" fill="rgba(255,215,0,0.4)"/>
  </g>
</svg>
